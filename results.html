<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ PUC Blitz Cup · Results Archive</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #0b1a2e 0%, #0f212f 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e7f0;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: rgba(20, 35, 55, 0.8);
            border-radius: 42px;
            padding: 20px 30px;
            border: 1px solid #2d4b6e;
        }
        .header h1 {
            color: #ffd966;
            font-size: 2.2rem;
        }
        .header-buttons {
            display: flex;
            gap: 15px;
        }
        .back-btn {
            background: #2b5270;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: 600;
            transition: 0.2s;
        }
        .back-btn:hover {
            background: #3d6f96;
        }
        .clear-btn {
            background: #b14e4e;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .clear-btn:hover {
            background: #c55a5a;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1a3145;
            border-radius: 30px;
            padding: 25px;
            border: 1px solid #4d9eff;
        }
        .stat-card h3 {
            color: #ffd966;
            margin-bottom: 15px;
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #44dd88;
        }
        .results-table {
            width: 100%;
            border-collapse: collapse;
            background: #1a3145;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }
        .results-table th {
            background: #2d4b6e;
            padding: 15px;
            text-align: left;
            color: #ffd966;
            font-weight: 600;
        }
        .results-table td {
            padding: 15px;
            border-bottom: 1px solid #3e5f7a;
        }
        .results-table tr:hover td {
            background: #254b6b;
        }
        .winner {
            color: #44dd88;
            font-weight: 600;
        }
        .details-btn {
            background: #4d9eff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
        }
        .details-btn:hover {
            background: #6bb0ff;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1a3448;
            border-radius: 40px;
            padding: 30px;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 2px solid #4d9eff;
        }
        .modal-content h2 {
            color: #ffd966;
            margin-bottom: 20px;
        }
        .problem-detail {
            background: #0a1b28;
            border-radius: 20px;
            padding: 15px;
            margin: 10px 0;
            border-left: 4px solid #4d9eff;
        }
        .close-btn {
            background: #b14e4e;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 40px;
            margin-top: 20px;
            cursor: pointer;
            font-weight: 600;
        }
        .no-data {
            text-align: center;
            padding: 50px;
            color: #aaccff;
            font-size: 1.2rem;
        }
        .timestamp {
            font-size: 0.85rem;
            color: #aaccff;
            margin-top: 5px;
        }
        .player-link {
            color: inherit;
            text-decoration: none;
            font-weight: 500;
        }
        .player-link:hover {
            text-decoration: underline;
            opacity: 0.9;
        }
        .password-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .password-content {
            background: linear-gradient(145deg, #1a3448, #0f2536);
            border-radius: 60px;
            padding: 40px;
            text-align: center;
            border: 3px solid #b14e4e;
            box-shadow: 0 0 50px rgba(177, 78, 78, 0.5);
        }
        .password-content h2 {
            color: #ff7b7b;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        .password-input {
            background: #0a1b28;
            border: 2px solid #b14e4e;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 1.2rem;
            width: 300px;
            margin: 20px 0;
            text-align: center;
        }
        .password-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .password-btn {
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
        }
        .confirm-btn {
            background: #b14e4e;
            color: white;
        }
        .cancel-btn {
            background: #2b5270;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Blitz Cup Results Archive</h1>
            <div class="header-buttons">
                <a href="index.html" class="back-btn">← Back to Arena</a>
                <a href="index.html#activeBlitzSection" class="back-btn">🔥 Active Rooms</a>
                <button class="clear-btn" id="clearAllBtn">Clear All</button>
            </div>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <h3>Total Blitz Matches</h3>
                <div class="stat-number" id="totalMatches">0</div>
            </div>
            <div class="stat-card">
                <h3>Most Wins</h3>
                <div class="stat-number" id="mostWins">-</div>
            </div>
            <div class="stat-card">
                <h3>Average Score</h3>
                <div class="stat-number" id="avgScore">0</div>
            </div>
        </div>

        <table class="results-table" id="resultsTable">
            <thead>
                <tr>
                    <th>Blitz #</th>
                    <th>Date & Time</th>
                    <th>Player 1</th>
                    <th>Score</th>
                    <th>Player 2</th>
                    <th>Score</th>
                    <th>Winner</th>
                    <th>Details</th>
                </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
        </table>
    </div>

    <div class="password-modal" id="adminPasswordModal">
        <div class="password-content">
            <h2>⛔ Admin Access</h2>
            <p>Enter admin password to clear all results:</p>
            <input type="password" class="password-input" id="adminPasswordInput" placeholder="Enter password">
            <div class="password-buttons">
                <button class="password-btn confirm-btn" id="confirmAdminPassword">Confirm</button>
                <button class="password-btn cancel-btn" id="cancelAdminPassword">Cancel</button>
            </div>
        </div>
    </div>

    <div class="modal" id="detailModal">
        <div class="modal-content">
            <h2 id="modalTitle">Blitz Details</h2>
            <div id="modalContent"></div>
            <button class="close-btn" id="closeModal">Close</button>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;
        const WS_URL = window.location.origin.replace('http', 'ws');
        const CANCEL_PASSWORD = 'PUC103815';
        let ws = null;
        let refreshTimer = null;
        
        const modal = document.getElementById('detailModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalContent = document.getElementById('modalContent');
        const closeModal = document.getElementById('closeModal');
        
        const adminPasswordModal = document.getElementById('adminPasswordModal');
        const adminPasswordInput = document.getElementById('adminPasswordInput');
        const confirmAdminPassword = document.getElementById('confirmAdminPassword');
        const cancelAdminPassword = document.getElementById('cancelAdminPassword');

        function getRankColor(rank) {
            const colors = {
                'Newbie': '#808080',
                'Pupil': '#008000',
                'Specialist': '#03a89e',
                'Expert': '#0000ff',
                'Candidate Master': '#aa00aa',
                'Master': '#ff8c00',
                'International Master': '#ff8c00',
                'Grandmaster': '#ff0000',
                'Legendary Grandmaster': '#ff0000'
            };
            return colors[rank] || '#e0e7f0';
        }

        async function loadResults() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/results`);
                const results = await response.json();
                
                displayStats(results);
                displayResults(results);
            } catch (error) {
                console.error('Error loading results:', error);
                document.getElementById('resultsBody').innerHTML = 
                    '<tr><td colspan="8" class="no-data">No results found. Start a blitz match first!</td></tr>';
            }
        }

        function connectResultsSocket() {
            ws = new WebSocket(WS_URL);

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'RESULTS_UPDATED') {
                        loadResults();
                    }
                } catch (error) {
                    console.error('Socket parse error:', error);
                }
            };

            ws.onclose = () => {
                setTimeout(connectResultsSocket, 2000);
            };
        }

        function startAutoRefresh() {
            if (refreshTimer) clearInterval(refreshTimer);
            refreshTimer = setInterval(loadResults, 5000);
        }

        function displayStats(results) {
            const totalMatches = results.length;
            document.getElementById('totalMatches').textContent = totalMatches;

            if (totalMatches > 0) {
                const winCount = {};
                results.forEach(r => {
                    if (r.winner !== 'tie') {
                        winCount[r.winner] = (winCount[r.winner] || 0) + 1;
                    }
                });
                
                let mostWins = '-';
                let maxWins = 0;
                for (const [player, count] of Object.entries(winCount)) {
                    if (count > maxWins) {
                        maxWins = count;
                        mostWins = `${player} (${count})`;
                    }
                }
                document.getElementById('mostWins').textContent = mostWins;

                const avgScore = results.reduce((sum, r) => sum + r.player1.score + r.player2.score, 0) / (totalMatches * 2);
                document.getElementById('avgScore').textContent = avgScore.toFixed(1);
            }
        }

        function displayResults(results) {
            const tbody = document.getElementById('resultsBody');
            if (results.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="no-data">No results found. Start a blitz match first!</td></tr>';
                return;
            }

            const orderedResults = [...results].sort((a, b) => {
                const aNum = Number(a.blitzNumber) || 0;
                const bNum = Number(b.blitzNumber) || 0;
                if (bNum !== aNum) return bNum - aNum;
                return new Date(b.date).getTime() - new Date(a.date).getTime();
            });
            
            tbody.innerHTML = orderedResults.map(r => {
                const date = new Date(r.date);
                const formattedDate = date.toLocaleDateString();
                const formattedTime = date.toLocaleTimeString();
                
                return `
                <tr>
                    <td><strong>#${r.blitzNumber}</strong></td>
                    <td>
                        ${formattedDate}<br>
                        <span class="timestamp">${formattedTime}</span>
                    </td>
                    <td>
                        <a href="https://codeforces.com/profile/${r.player1.handle}" target="_blank" class="player-link" style="color: ${getRankColor(r.player1.rank)};">
                            ${r.player1.handle}
                        </a>
                    </td>
                    <td><strong style="color: #ffd966;">${r.player1.score}</strong></td>
                    <td>
                        <a href="https://codeforces.com/profile/${r.player2.handle}" target="_blank" class="player-link" style="color: ${getRankColor(r.player2.rank)};">
                            ${r.player2.handle}
                        </a>
                    </td>
                    <td><strong style="color: #ffd966;">${r.player2.score}</strong></td>
                    <td class="winner">${r.winner === 'tie' ? '🤝 TIE' : r.winner}</td>
                    <td><button class="details-btn" onclick='showDetails(${JSON.stringify(r).replace(/'/g, "\\'")})'>View</button></td>
                </tr>
            `}).join('');
        }

        function showDetails(result) {
            modalTitle.textContent = `Blitz #${result.blitzNumber} Details`;
            
            const date = new Date(result.date);
            const formattedDateTime = `${date.toLocaleDateString()} ${date.toLocaleTimeString()}`;
            
            let problemsHtml = '<h3>Problem Details</h3>';
            result.problems.forEach((p, idx) => {
                const problemUrl = p.url || (p.contestId && p.index
                    ? `https://codeforces.com/problemset/problem/${p.contestId}/${p.index}`
                    : null);
                const problemTitle = p.name || `Problem ${idx + 1}`;
                problemsHtml += `
                    <div class="problem-detail">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <strong>${problemUrl
                                ? `<a href="${problemUrl}" target="_blank" style="color:#8ec5ff;text-decoration:none;">${problemTitle}</a>`
                                : problemTitle}</strong>
                            <span>${p.points} pts | Rating: ${p.rating}</span>
                        </div>
                        ${problemUrl ? `<div style="margin-bottom:8px;"><a href="${problemUrl}" target="_blank" style="color:#9ac8ff; font-size:0.9rem;">Open problem link</a></div>` : ''}
                        <div style="display: flex; gap: 20px;">
                            <div style="flex: 1;">
                                <a href="https://codeforces.com/profile/${result.player1.handle}" target="_blank" style="color: ${getRankColor(result.player1.rank)};">
                                    ${result.player1.handle}
                                </a>: 
                                ${p.p1Result.solved ? '✅' : '❌'}
                            </div>
                            <div style="flex: 1;">
                                <a href="https://codeforces.com/profile/${result.player2.handle}" target="_blank" style="color: ${getRankColor(result.player2.rank)};">
                                    ${result.player2.handle}
                                </a>: 
                                ${p.p2Result.solved ? '✅' : '❌'}
                            </div>
                        </div>
                    </div>
                `;
            });

            modalContent.innerHTML = `
                <p><strong>Date & Time:</strong> ${formattedDateTime}</p>
                <p><strong>Duration:</strong> ${result.duration} minutes</p>
                <p><strong>Winner:</strong> <span class="winner">${result.winner === 'tie' ? '🤝 TIE' : result.winner}</span></p>
                <br>
                ${problemsHtml}
            `;
            
            modal.style.display = 'flex';
        }

        document.getElementById('clearAllBtn').addEventListener('click', () => {
            adminPasswordModal.style.display = 'flex';
            adminPasswordInput.value = '';
            adminPasswordInput.focus();
        });

        confirmAdminPassword.addEventListener('click', async () => {
            const enteredPassword = adminPasswordInput.value;
            
            if (enteredPassword === CANCEL_PASSWORD) {
                adminPasswordModal.style.display = 'none';
                
                if (confirm('Are you sure you want to clear all results? This cannot be undone.')) {
                    try {
                        const response = await fetch(`${API_BASE_URL}/api/results`, {
                            method: 'DELETE'
                        });
                        if (response.ok) {
                            loadResults();
                        }
                    } catch (error) {
                        console.error('Error clearing results:', error);
                    }
                }
            } else {
                alert('Incorrect password!');
                adminPasswordInput.value = '';
                adminPasswordInput.focus();
            }
        });

        cancelAdminPassword.addEventListener('click', () => {
            adminPasswordModal.style.display = 'none';
        });

        closeModal.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
            if (e.target === adminPasswordModal) {
                adminPasswordModal.style.display = 'none';
            }
        });

        connectResultsSocket();
        startAutoRefresh();
        loadResults();
    </script>
</body>
</html>
