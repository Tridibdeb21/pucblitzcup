<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUC Blitz Cup · Head-to-Head</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="headtohead.css">
    <link rel="stylesheet" href="floating-scrollbar.css">
</head>
<body>
    <div class="container">
        <div class="quick-nav">
            <a href="index.html" class="quick-nav-btn">Arena</a>
            <a href="index.html#roomControls" class="quick-nav-btn">Rooms</a>
            <a href="index.html#activeBlitzSection" class="quick-nav-btn">Active</a>
            <a href="bracket.html" class="quick-nav-btn">Bracket</a>
            <a href="headtohead.html" class="quick-nav-btn">Head-to-Head</a>
            <a href="profile.html" class="quick-nav-btn">Profile</a>
            <a href="leaderboard.html" class="quick-nav-btn">Global Leaderboard</a>
            <a href="results.html" class="quick-nav-btn">Results</a>
            <a href="feedback.html" class="quick-nav-btn">Feedback</a>
            <div class="quick-nav-account">
                <a href="index.html?login=1" class="global-handle-chip not-verified" data-global-handle-chip>Login</a>
            </div>
        </div>

        <header class="blitz-header">
            <div>
                <h1>Head-to-Head</h1>
                <p class="subtitle">Compare two handles from Blitz history</p>
            </div>
        </header>

        <section class="panel">
            <div class="form-grid">
                <div>
                    <label for="handleOneInput">Handle 1</label>
                    <input id="handleOneInput" type="text" placeholder="tourist">
                </div>
                <div>
                    <label for="handleTwoInput">Handle 2</label>
                    <input id="handleTwoInput" type="text" placeholder="Benq">
                </div>
            </div>
            <button id="compareBtn" class="primary-btn">Compare</button>
            <p class="note" id="compareNote"></p>
        </section>

        <section class="panel" id="summaryPanel" style="display:none;">
            <h2 id="summaryTitle">Summary</h2>
            <div class="stats-grid" id="statsGrid"></div>
        </section>

        <section class="panel" id="matchesPanel" style="display:none;">
            <h2>Recent Meetings</h2>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Room</th>
                            <th>Winner</th>
                            <th>Score</th>
                            <th>History</th>
                        </tr>
                    </thead>
                    <tbody id="matchesBody"></tbody>
                </table>
            </div>
        </section>

        <footer class="site-footer">
            <p>© 2026 PUC Blitz Cup. All rights reserved.</p>
            <p class="site-version">v3.0</p>
            <p>
                Developers:
                <a href="https://codeforces.com/profile/ELSE_IF_TRIDIB21" target="_blank" rel="noopener noreferrer">Tridib</a>,
                <a href="https://codeforces.com/profile/MishkatIT" target="_blank" rel="noopener noreferrer">Mishkat</a>
                | Tester: <a href="https://codeforces.com/profile/dip.barua" target="_blank" rel="noopener noreferrer">Dip</a>
            </p>
        </footer>
    </div>

    <script src="global-profile-presence.js"></script>
    <script src="quick-nav-overflow.js"></script>
    <script src="floating-scrollbar.js"></script>
    <script src="headtohead.js"></script>
    <script src="search-suggestions.js"></script>
</body>
</html>
