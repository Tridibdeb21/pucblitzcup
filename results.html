<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUC Blitz Cup · Results Archive</title>
    <link rel="stylesheet" href="results.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>Results Archive</h1>
                <p class="subtitle">Recent blitz history and player outcomes</p>
            </div>
            <div class="header-buttons">
                <a href="index.html" class="back-btn">Arena</a>
                <a href="index.html#activeBlitzSection" class="back-btn">Active Rooms</a>
                <button class="clear-btn" id="clearAllBtn">Clear All</button>
            </div>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <h3>Total Matches</h3>
                <div class="stat-number" id="totalMatches">0</div>
            </div>
            <div class="stat-card">
                <h3>Most Wins</h3>
                <div class="stat-number" id="mostWins">-</div>
            </div>
            <div class="stat-card">
                <h3>Average Score</h3>
                <div class="stat-number" id="avgScore">0</div>
            </div>
        </div>

        <div class="table-wrap">
            <table class="results-table" id="resultsTable">
                <thead>
                    <tr>
                        <th>Blitz</th>
                        <th>Date & Time</th>
                        <th>Player 1</th>
                        <th>Score</th>
                        <th>Player 2</th>
                        <th>Score</th>
                        <th>Winner</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody id="resultsBody"></tbody>
            </table>
        </div>
    </div>

    <div class="password-modal" id="adminPasswordModal">
        <div class="password-content">
            <h2>Admin Access</h2>
            <p>Enter admin password to clear all results:</p>
            <input type="password" class="password-input" id="adminPasswordInput" placeholder="Enter password">
            <div class="password-buttons">
                <button class="password-btn confirm-btn" id="confirmAdminPassword">Confirm</button>
                <button class="password-btn cancel-btn" id="cancelAdminPassword">Cancel</button>
            </div>
        </div>
    </div>

    <div class="modal" id="detailModal">
        <div class="modal-content">
            <h2 id="modalTitle">Blitz Details</h2>
            <div id="modalContent"></div>
            <button class="close-btn" id="closeModal">Close</button>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;
        const WS_URL = window.location.origin.replace('http', 'ws');
        let ws = null;
        let refreshTimer = null;

        const modal = document.getElementById('detailModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalContent = document.getElementById('modalContent');
        const closeModal = document.getElementById('closeModal');

        const adminPasswordModal = document.getElementById('adminPasswordModal');
        const adminPasswordInput = document.getElementById('adminPasswordInput');
        const confirmAdminPassword = document.getElementById('confirmAdminPassword');
        const cancelAdminPassword = document.getElementById('cancelAdminPassword');

        function getRankColor(rank) {
            const colors = {
                'Newbie': '#8a8f99',
                'Pupil': '#74ca77',
                'Specialist': '#4bc7b8',
                'Expert': '#6ea8fe',
                'Candidate Master': '#c67bf3',
                'Master': '#ffb86a',
                'International Master': '#ffb86a',
                'Grandmaster': '#ff7d7d',
                'Legendary Grandmaster': '#ff7d7d'
            };
            return colors[rank] || '#f3f5f8';
        }

        async function loadResults() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/results`);
                const results = await response.json();

                displayStats(results);
                displayResults(results);
            } catch (error) {
                console.error('Error loading results:', error);
                document.getElementById('resultsBody').innerHTML =
                    '<tr><td colspan="8" class="no-data">No results found. Start a blitz match first.</td></tr>';
            }
        }

        function connectResultsSocket() {
            ws = new WebSocket(WS_URL);

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'RESULTS_UPDATED') {
                        loadResults();
                    }
                } catch (error) {
                    console.error('Socket parse error:', error);
                }
            };

            ws.onclose = () => {
                setTimeout(connectResultsSocket, 2000);
            };
        }

        function startAutoRefresh() {
            if (refreshTimer) clearInterval(refreshTimer);
            refreshTimer = setInterval(loadResults, 5000);
        }

        function displayStats(results) {
            const totalMatches = results.length;
            document.getElementById('totalMatches').textContent = totalMatches;

            if (totalMatches > 0) {
                const winCount = {};
                results.forEach(r => {
                    if (r.winner !== 'tie') {
                        winCount[r.winner] = (winCount[r.winner] || 0) + 1;
                    }
                });

                let mostWins = '-';
                let maxWins = 0;
                for (const [player, count] of Object.entries(winCount)) {
                    if (count > maxWins) {
                        maxWins = count;
                        mostWins = `${player} (${count})`;
                    }
                }
                document.getElementById('mostWins').textContent = mostWins;

                const avgScore = results.reduce((sum, r) => sum + r.player1.score + r.player2.score, 0) / (totalMatches * 2);
                document.getElementById('avgScore').textContent = avgScore.toFixed(1);
            }
        }

        function displayResults(results) {
            const tbody = document.getElementById('resultsBody');
            if (results.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="no-data">No results found. Start a blitz match first.</td></tr>';
                return;
            }

            const orderedResults = [...results].sort((a, b) => {
                const aNum = Number(a.blitzNumber) || 0;
                const bNum = Number(b.blitzNumber) || 0;
                if (bNum !== aNum) return bNum - aNum;
                return new Date(b.date).getTime() - new Date(a.date).getTime();
            });

            tbody.innerHTML = orderedResults.map(r => {
                const date = new Date(r.date);
                const formattedDate = date.toLocaleDateString();
                const formattedTime = date.toLocaleTimeString();

                return `
                <tr>
                    <td><strong>#${r.blitzNumber}</strong></td>
                    <td>
                        ${formattedDate}<br>
                        <span class="timestamp">${formattedTime}</span>
                    </td>
                    <td>
                        <a href="https://codeforces.com/profile/${r.player1.handle}" target="_blank" class="player-link" style="color: ${getRankColor(r.player1.rank)};">
                            ${r.player1.handle}
                        </a>
                    </td>
                    <td><strong>${r.player1.score}</strong></td>
                    <td>
                        <a href="https://codeforces.com/profile/${r.player2.handle}" target="_blank" class="player-link" style="color: ${getRankColor(r.player2.rank)};">
                            ${r.player2.handle}
                        </a>
                    </td>
                    <td><strong>${r.player2.score}</strong></td>
                    <td class="winner">${r.winner === 'tie' ? 'TIE' : r.winner}</td>
                    <td><button class="details-btn" onclick='showDetails(${JSON.stringify(r).replace(/'/g, "\\'")})'>View</button></td>
                </tr>
            `}).join('');
        }

        function showDetails(result) {
            modalTitle.textContent = `Blitz #${result.blitzNumber} Details`;

            const date = new Date(result.date);
            const formattedDateTime = `${date.toLocaleDateString()} ${date.toLocaleTimeString()}`;

            let problemsHtml = '<h3 class="modal-subtitle">Problem Details</h3>';
            result.problems.forEach((p, idx) => {
                const problemUrl = p.url || (p.contestId && p.index
                    ? `https://codeforces.com/problemset/problem/${p.contestId}/${p.index}`
                    : null);
                const problemTitle = p.name || `Problem ${idx + 1}`;
                problemsHtml += `
                    <div class="problem-detail">
                        <div class="problem-detail-top">
                            <strong>${problemUrl
                                ? `<a href="${problemUrl}" target="_blank" class="problem-link">${problemTitle}</a>`
                                : problemTitle}</strong>
                            <span>${p.points} pts · Rating ${p.rating}</span>
                        </div>
                        ${problemUrl ? `<div><a href="${problemUrl}" target="_blank" class="problem-link muted-link">Open problem link</a></div>` : ''}
                        <div class="problem-players">
                            <div>
                                <a href="https://codeforces.com/profile/${result.player1.handle}" target="_blank" style="color: ${getRankColor(result.player1.rank)};">
                                    ${result.player1.handle}
                                </a>:
                                ${p.p1Result.solved ? '✅' : '❌'}
                            </div>
                            <div>
                                <a href="https://codeforces.com/profile/${result.player2.handle}" target="_blank" style="color: ${getRankColor(result.player2.rank)};">
                                    ${result.player2.handle}
                                </a>:
                                ${p.p2Result.solved ? '✅' : '❌'}
                            </div>
                        </div>
                    </div>
                `;
            });

            modalContent.innerHTML = `
                <p><strong>Date & Time:</strong> ${formattedDateTime}</p>
                <p><strong>Duration:</strong> ${result.duration} minutes</p>
                <p><strong>Winner:</strong> <span class="winner">${result.winner === 'tie' ? 'TIE' : result.winner}</span></p>
                ${problemsHtml}
            `;

            modal.style.display = 'flex';
        }

        document.getElementById('clearAllBtn').addEventListener('click', () => {
            adminPasswordModal.style.display = 'flex';
            adminPasswordInput.value = '';
            adminPasswordInput.focus();
        });

        confirmAdminPassword.addEventListener('click', async () => {
            const enteredPassword = adminPasswordInput.value;

            if (!enteredPassword) {
                alert('Please enter admin password.');
                adminPasswordInput.focus();
                return;
            }

            if (confirm('Are you sure you want to clear all results? This cannot be undone.')) {
                try {
                    const response = await fetch(`${API_BASE_URL}/api/results`, {
                        method: 'DELETE',
                        headers: {
                            'x-admin-password': enteredPassword
                        }
                    });

                    if (response.ok) {
                        adminPasswordModal.style.display = 'none';
                        loadResults();
                        return;
                    }

                    if (response.status === 401) {
                        alert('Incorrect password.');
                    } else {
                        alert('Could not clear results right now.');
                    }
                } catch (error) {
                    console.error('Error clearing results:', error);
                    alert('Network error while clearing results.');
                }

                adminPasswordInput.value = '';
                adminPasswordInput.focus();
            }
        });

        cancelAdminPassword.addEventListener('click', () => {
            adminPasswordModal.style.display = 'none';
        });

        closeModal.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
            if (e.target === adminPasswordModal) {
                adminPasswordModal.style.display = 'none';
            }
        });

        connectResultsSocket();
        startAutoRefresh();
        loadResults();
    </script>
</body>
</html>
